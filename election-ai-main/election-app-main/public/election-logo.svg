<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Election AI logo</title>
  <desc id="desc">A ballot box with a voting slip and chat spark in Indian tricolor tones.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8ef" />
      <stop offset="100%" stop-color="#eef5ff" />
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c3f94" />
      <stop offset="100%" stop-color="#0f255f" />
    </linearGradient>
    <linearGradient id="slip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f4fb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#102452" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <circle cx="256" cy="120" r="72" fill="#ff9933" opacity="0.18" />
  <circle cx="396" cy="396" r="84" fill="#138808" opacity="0.12" />

  <g filter="url(#shadow)">
    <rect x="112" y="216" width="288" height="180" rx="36" fill="url(#box)" />
    <rect x="172" y="248" width="168" height="18" rx="9" fill="#89a6ff" opacity="0.9" />

    <g transform="rotate(-12 246 174)">
      <rect x="178" y="96" width="136" height="176" rx="20" fill="url(#slip)" />
      <rect x="198" y="126" width="96" height="16" rx="8" fill="#ff9933" />
      <rect x="198" y="154" width="76" height="12" rx="6" fill="#d3dcf2" />
      <rect x="198" y="176" width="92" height="12" rx="6" fill="#d3dcf2" />
      <rect x="198" y="198" width="62" height="12" rx="6" fill="#138808" />
      <circle cx="274" cy="222" r="16" fill="#1a3c8a" />
      <path d="M267 222l6 7 12-15" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <path d="M346 120c22 0 40 16 40 35 0 12-7 23-19 30v26l-26-19h-18c-22 0-40-16-40-37s18-35 40-35z" fill="#ffffff" opacity="0.95" />
  <circle cx="332" cy="155" r="7" fill="#ff9933" />
  <circle cx="354" cy="155" r="7" fill="#1a3c8a" />
  <circle cx="376" cy="155" r="7" fill="#138808" />
</svg>
